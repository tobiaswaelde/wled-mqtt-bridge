name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build release binary (musl)
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Extract release notes
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes_file="release-notes.md"

          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { capture = 1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md > "$notes_file"

          if [ ! -s "$notes_file" ]; then
            echo "No changelog entry found for ${version}" >&2
            exit 1
          fi

      - name: Package release artifacts
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          staging="dist/wled-mqtt-bridge-${version}"
          archive="dist/wled-mqtt-bridge-${version}-linux-musl-x86_64.tar.gz"

          rm -rf dist
          mkdir -p "$staging"
          cp target/x86_64-unknown-linux-musl/release/wled-mqtt-bridge "$staging/"
          cp LICENSE.txt README.md "$staging/"

          tar -C dist -czf "$archive" "wled-mqtt-bridge-${version}"
          sha256sum "$archive" > "${archive}.sha256"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WLED MQTT Bridge ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.sha256

  seed_changelog:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Seed Unreleased changelog section
        shell: bash
        run: |
          if grep -q '^## \[Unreleased\]' CHANGELOG.md; then
            echo "Unreleased section already exists."
            exit 0
          fi

          tmp="$(mktemp)"
          awk '
            BEGIN { inserted = 0 }
            /^## \[/ && !inserted {
              print "## [Unreleased]"
              print ""
              inserted = 1
            }
            { print }
          ' CHANGELOG.md > "$tmp"
          mv "$tmp" CHANGELOG.md

      - name: Commit changelog update
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "No changelog update required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: seed unreleased changelog section"
          git push origin HEAD:"$DEFAULT_BRANCH"
