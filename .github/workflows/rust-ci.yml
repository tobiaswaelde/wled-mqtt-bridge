name: Rust CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build checks
        run: cargo check

      - name: Tests
        run: cargo test

  container-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: wled-mqtt-bridge:ci

      - name: Start test MQTT broker
        run: |
          docker network create wled-ci
          docker run -d --rm \
            --name ci-mosquitto \
            --network wled-ci \
            eclipse-mosquitto:2

      - name: Create smoke config
        run: |
          cat > /tmp/wled-ci-config.yml <<'CONFIG'
          mqtt:
            host: ci-mosquitto
            port: 1883
            base_topic: wled
          wled:
            controllers:
              - id: demo
                host: 127.0.0.1
          polling:
            timeout_ms: 2000
            interval_ms: 5000
            timeout_duration_ms: 30000
          publish:
            qos:
              state: 0
              info: 0
              effects: 0
              palettes: 0
              online: 0
              bridge_online: 0
              cmd_reset: 0
              dead_letter: 0
            retain:
              state: false
              info: true
              effects: true
              palettes: true
              online: true
              bridge_online: true
              cmd_reset: false
              dead_letter: false
          logging:
            level: info
            json: false
          metrics:
            enabled: false
            host: 0.0.0.0
            port: 9090
            path: /metrics
          CONFIG

      - name: Run container healthcheck command
        run: |
          docker run --rm \
            --network wled-ci \
            -v /tmp/wled-ci-config.yml:/app/config/config.yml:ro \
            wled-mqtt-bridge:ci \
            /app/wled-mqtt-bridge --config /app/config/config.yml --healthcheck

      - name: Cleanup test broker
        if: always()
        run: |
          docker rm -f ci-mosquitto || true
          docker network rm wled-ci || true
