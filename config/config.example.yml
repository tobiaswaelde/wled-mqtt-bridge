mqtt:
  protocol: mqtt
  host: 127.0.0.1
  port: 1883
  client_id: wled-mqtt-bridge
  username:
  password:
  base_topic: wled
  keep_alive_secs: 30
  reconnect_delay_secs: 5

wled:
  controllers:
    - id: living-room
      # Supports host/IP with or without scheme. Example: 192.168.1.50 or http://192.168.1.50
      host: 192.168.1.50
    - id: office
      host: 192.168.1.51

polling:
  interval_ms: 1000
  timeout_ms: 30000
  timeout_duration_ms: 30000

publish:
  json_object: true
  json_keys: true

logging:
  level: info
  json: false
