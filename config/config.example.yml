mqtt:
  protocol: mqtt
  host: 127.0.0.1
  port: 1883
  client_id: wled-mqtt-bridge
  username:
  password:
  base_topic: wled
  dead_letter_suffix: dead_letter
  keep_alive_secs: 30
  reconnect_delay_secs: 5
  reconnect_max_delay_secs: 60

wled:
  # Optional global timeout for WLED HTTP calls. If omitted, requests use reqwest default behavior.
  # http_timeout_ms: 5000
  controllers:
    - id: living-room
      # Supports host/IP with or without scheme. Example: 192.168.1.50 or http://192.168.1.50
      host: 192.168.1.50
      interval_ms: 1000
      timeout_ms: 30000
      timeout_duration_ms: 30000
      # Optional per-controller override for HTTP request timeout.
      # http_timeout_ms: 5000
    - id: office
      host: 192.168.1.51

polling:
  interval_ms: 1000
  timeout_ms: 30000
  timeout_duration_ms: 30000

publish:
  json_object: true
  json_keys: true
  qos:
    state: 0
    info: 0
    effects: 0
    palettes: 0
    online: 1
    bridge_online: 1
    cmd_reset: 0
    dead_letter: 0
  retain:
    state: false
    info: false
    effects: false
    palettes: false
    online: true
    bridge_online: true
    cmd_reset: false
    dead_letter: false

metrics:
  enabled: false
  host: 0.0.0.0
  port: 9090
  path: /metrics

logging:
  level: info
  json: false
