services:
  wled-mqtt-bridge:
    container_name: wled-mqtt-bridge
    image: ghcr.io/tobiaswaelde/wled-mqtt-bridge:${IMAGE_TAG:-latest}
    restart: unless-stopped
    volumes:
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "/app/wled-mqtt-bridge", "--config", "/app/config/config.yml", "--healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    cpus: "0.50"
    mem_limit: 128m
